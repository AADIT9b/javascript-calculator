<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Neumorphic Calculator</title>
  <style>
    :root {
      /* 3D Color Palette */
      --bg-color: #e0e5ec;
      --text-color: #44474b;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      --accent: #6d5dfc;
    }

    [data-theme="dark"] {
      --bg-color: #2d3436;
      --text-color: #dfe6e9;
      --shadow-light: #3d4446;
      --shadow-dark: #1e2223;
      --accent: #00cec9;
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Arial', sans-serif;
      transition: all 0.4s ease;
    }

    .calculator-card {
      background-color: var(--bg-color);
      padding: 30px;
      border-radius: 30px;
      /* This shadow creates the 3D pop-out effect */
      box-shadow: 9px 9px 16px var(--shadow-dark), 
                  -9px -9px 16px var(--shadow-light);
      width: 320px;
    }

    .show {
      width: 100%;
      height: 60px;
      background-color: var(--bg-color);
      border-radius: 10px;
      /* Inset shadow makes the screen look "pressed in" */
      box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                  inset -6px -6px 12px var(--shadow-light);
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 15px;
      box-sizing: border-box;
      font-size: 1.5rem;
      color: var(--text-color);
      font-family: 'Courier New', monospace;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 6px 6px 12px var(--shadow-dark), 
                  -6px -6px 12px var(--shadow-light);
      transition: all 0.2s ease;
    }

    /* 3D "Press" Effect */
    button:active {
      box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                  inset -4px -4px 8px var(--shadow-light);
      transform: scale(0.98);
    }

    .operator {
      color: var(--accent);
    }

    .equal {
      grid-column: span 2;
      width: 140px;
      border-radius: 30px;
      background: var(--accent);
      color: white;
    }

    .clear {
      grid-column: span 2;
      width: 140px;
      border-radius: 30px;
      margin-top: 10px;
      color: #ff7675;
    }

    .theme-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <button class="theme-btn" onclick="toggleTheme()">MODE</button>

  <div class="calculator-card">
    <div class="show">0</div>

    <div class="button-grid">
      <button onclick="firstLine('1')">1</button>
      <button onclick="firstLine('2')">2</button>
      <button onclick="firstLine('3')">3</button>
      <button class="operator" onclick="firstLine('+')">+</button>

      <button onclick="firstLine('4')">4</button>
      <button onclick="firstLine('5')">5</button>
      <button onclick="firstLine('6')">6</button>
      <button class="operator" onclick="firstLine('-')">-</button>

      <button onclick="firstLine('7')">7</button>
      <button onclick="firstLine('8')">8</button>
      <button onclick="firstLine('9')">9</button>
      <button class="operator" onclick="firstLine('*')">*</button>

      <button onclick="firstLine('.')">.</button>
      <button onclick="firstLine('0')">0</button>
      <button class="operator" onclick="firstLine('/')">/</button>
      <button class="operator" onclick="firstLine('**')">^</button>

      <button class="equal" onclick="calculate()">=</button>
      <button class="clear" onclick="clearCalc()">AC</button>
    </div>
  </div>

  <script>
    let calculation = localStorage.getItem('calculation') || '';

    function toggleTheme() {
      const body = document.documentElement;
      const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      body.setAttribute('data-theme', theme);
    }

    function firstLine(value) {
      calculation += value;
      updateDisplay();
    }

    function calculate() {
      try {
        calculation = eval(calculation).toString();
        updateDisplay();
      } catch {
        calculation = 'Error';
        updateDisplay();
        calculation = '';
      }
    }

    function clearCalc() {
      calculation = '';
      updateDisplay();
    }

    function updateDisplay() {
      document.querySelector('.show').innerText = calculation || '0';
      localStorage.setItem('calculation', calculation);
    }

    updateDisplay();
  </script>
</body>
</html>
